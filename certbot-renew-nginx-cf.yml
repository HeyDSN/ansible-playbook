---
- name: Renew Let's Encrypt certificates on multiple hosts
  hosts: all
  become: true
  ignore_unreachable: yes

  vars:
    ansible_remote_tmp: /tmp
    ansible_ssh_args: >-
      -o ControlMaster=auto
      -o ControlPersist=10m
      -o ConnectTimeout=30
      -o ServerAliveInterval=30
      -o ServerAliveCountMax=3
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ConnectTimeout=30"
    ansible_timeout: 300

    discord_webhook_url: "{{ lookup('env', 'ADW_CERTBOT') }}"
    certbot_log_file: "/var/log/letsencrypt/letsencrypt.log"
    certbot_temp_log: "/tmp/certbot.log"

  tasks:
    - name: Ensure letsencrypt log directory exists
      file:
        path: /var/log/letsencrypt
        state: directory
        mode: "0755"

    - name: Clear existing Certbot log file
      file:
        path: "{{ certbot_log_file }}"
        state: absent

    - name: Renew Let's Encrypt certificates (with retries and full logging)
      shell: |
        set -o pipefail
        for i in {1..3}; do
          certbot renew --dns-cloudflare --non-interactive -v 2>&1 | tee "{{ certbot_temp_log }}" && break
          echo "Renewal attempt $i failed. Retrying in 60 seconds..." >&2
          sleep 60
        done
      args:
        executable: /bin/bash
      register: certbot_result
      async: 600
      poll: 10
      changed_when: >
        'Congratulations' in certbot_result.stdout or
        'successfully renewed' in certbot_result.stdout

    - name: Print certbot log to Semaphore UI
      debug:
        var: certbot_result.stdout_lines

    - name: Reload nginx if certificates were renewed
      shell: |
        nginx -t && nginx -s reload
      when: >
        'Congratulations' in certbot_result.stdout or
        'successfully renewed' in certbot_result.stdout

    - name: Extract renewed domains from certbot output
      set_fact:
        renewed_domains: >-
          {{
            certbot_result.stdout_lines
            | select('search', '^Renewing an existing certificate for')
            | map('regex_replace', '^Renewing an existing certificate for ', '')
            | list
          }}

    - name: Send Discord webhook notification for successful renewal
      uri:
        url: "{{ discord_webhook_url }}"
        method: POST
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          embeds:
            - title: "✅ Let's Encrypt Renewal Successful"
              description: "Certificates renewed on `{{ inventory_hostname }}`"
              color: 3066993
              fields:
                - name: "Renewed Domains"
                  value: "{{ renewed_domains | join('\n') }}"
                - name: "Renewal Summary"
                  value: >-
                    {{
                      certbot_result.stdout_lines
                      | select('search', 'Congratulations|successfully renewed|Renewing an existing certificate')
                      | list
                      | join('\n')
                      | truncate(900, True, '...')
                    }}
              timestamp: "{{ ansible_date_time.iso8601 }}"
      when: renewed_domains | length > 0

    - name: Remove temporary certbot log
      file:
        path: "{{ certbot_temp_log }}"
        state: absent
